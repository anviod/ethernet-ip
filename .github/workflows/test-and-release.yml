name: Test and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod tidy

      - name: Run unit tests
        run: go test -v ./...

      - name: Run integration tests
        run: go test -v -run TestProtocolVerifier_Integration ./test/...

  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Release ${{ github.ref_name }}
            
            ### Changes
            
            - Bug fixes and improvements
            - All tests passed
            
            ### Supported Data Types
            
            | Type | Size | Description |
            |------|------|-------------|
            | BOOL | 1 bit | Boolean |
            | SINT | 1 byte | Signed 8-bit integer |
            | INT | 2 bytes | Signed 16-bit integer |
            | DINT | 4 bytes | Signed 32-bit integer |
            | LINT | 8 bytes | Signed 64-bit integer |
            | USINT | 1 byte | Unsigned 8-bit integer |
            | UINT | 2 bytes | Unsigned 16-bit integer |
            | UDINT | 4 bytes | Unsigned 32-bit integer |
            | ULINT | 8 bytes | Unsigned 64-bit integer |
            | REAL | 4 bytes | 32-bit floating point |
            | LREAL | 8 bytes | 64-bit floating point |
            | STRING | variable | CIP string |